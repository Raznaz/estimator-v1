services:
  postgres:
    image: postgres:16-alpine
    container_name: estimator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estimator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estimator}
      POSTGRES_DB: ${POSTGRES_DB:-estimator}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - estimator_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-estimator}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  estimator_pgdata:
